services:
  unifi-echobell-webhook:
    image: ghcr.io/sbhhbs/unifi-echobell-webhook:latest
    container_name: unifi-echobell-webhook
    pull_policy: always
    restart: unless-stopped
    ports:
      - "8077:8080"
    environment:
      ECHOBELL_DIRECT_KEY: "${ECHOBELL_DIRECT_KEY:?ECHOBELL_DIRECT_KEY is required}"
      ALWAYS_NOTIFY: "${ALWAYS_NOTIFY:-false}"
    volumes:
      - unifi-echobell-data:/data

volumes:
  unifi-echobell-data:
